<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>samora.LAB — Product Image Studio</title>
  <meta name="description" content="כלי עריכת תמונות מוצר מבוסס AI" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #111111; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (for JSX in browser) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAVMJbiTHinPnsIRu3zvul_HSzcZ2-8D98",
      authDomain: "samora-lab.firebaseapp.com",
      projectId: "samora-lab",
      storageBucket: "samora-lab.firebasestorage.app",
      messagingSenderId: "869894209795",
      appId: "1:869894209795:web:23698dfe7ae8b51a7b2936"
    };

    const fbApp = initializeApp(firebaseConfig);
    const auth  = getAuth(fbApp);
    const db    = getFirestore(fbApp);

    // Expose to global scope for the React component
    window.__firebase = { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, doc, setDoc, getDoc, collection, getDocs, deleteDoc };

    // Signal that Firebase is ready
    window.dispatchEvent(new Event("firebase-ready"));
  </script>

  <!-- Main App -->
  <script type="text/babel" data-type="module">
    const { useState, useRef, useCallback, useEffect } = React;

    // Wait for Firebase
    const waitForFirebase = () => new Promise(res => {
      if (window.__firebase) return res(window.__firebase);
      window.addEventListener("firebase-ready", () => res(window.__firebase), { once: true });
    });

    // ── Design tokens ─────────────────────────────────────────────
    const C = {
      headerBg:"#111111", headerText:"#ffffff", headerBorder:"#333333",
      bodyBg:"#ffffff",   bodyText:"#111111",
      panelBg:"#f4f4f4",  panelBorder:"#e2e2e2",
      green:"#08f82e",    greenDark:"#06c825",  greenLight:"rgba(8,248,46,0.12)",
      muted:"#777777",    mutedDark:"#444444",
      inputBg:"#f9f9f9",  inputBorder:"#d8d8d8",
    };

    const LIGHTING_OPTIONS  = ["סטודיו נקי","רך ומפוזר","דרמטי - צד","טבעי - חלון","רטרו - חם","קריר וטכנולוגי"];
    const ANGLE_OPTIONS     = ["פרונטלי ישיר","45° ימין","45° שמאל","עילי (מלמעלה)","3/4 פרונטלי","תחתי (מלמטה)"];
    const ASPECT_OPTIONS    = ["1:1 (ריבועי)","4:3 (סטנדרט)","16:9 (רחב)","2:3 (פורטרט)","3:4 (פורטרט רחב)","4:5 (אינסטגרם)"];
    const STYLE_OPTIONS     = ["מינימליסטי","לוקס","ספורטיבי","טכנולוגי","אורגני-טבעי","אורבני","פרמיום"];
    const BG_OPTIONS        = ["לבן נקי","אפור בהיר","אפור כהה","שחור","גרדיאנט אפור","גרדיאנט כהה","בז' עדין","כחול עמוק"];
    const SHARPNESS_OPTIONS = ["רגיל","חד מאוד","עומק שדה רדוד","פוקוס מושלם"];
    const SHADOW_OPTIONS    = ["ללא צל","צל עדין","צל נפח","רפלקציה (ראי)","צל דרמטי"];
    const CONTRAST_OPTIONS  = ["רגיל","ניגודיות גבוהה","ניגודיות נמוכה - רכה","HDR"];

    const AI_PROVIDERS = [
      { id:"openai",    name:"DALL·E 3",      sub:"OpenAI",       color:"#ffffff" },
      { id:"stability", name:"Nano Banana 2", sub:"Stability AI", color:"#ffffff" },
      { id:"replicate", name:"Replicate",     sub:"SDXL",         color:"#ffffff" },
    ];

    const OPENAI_MODELS = [
      { id:"gpt-5.4",  name:"GPT-5.4",  badge:"חדש",    badgeColor:"#08f82e", desc:"המודל החזק ביותר — vision, קוד, agents", imageModel:"gpt-image-1" },
      { id:"gpt-5.2",  name:"GPT-5.2",  badge:null,      badgeColor:null,      desc:"מודל קודם — יציב ומהיר",                  imageModel:"dall-e-3"   },
      { id:"dall-e-3", name:"DALL·E 3", badge:"תמונות", badgeColor:"#08f82e", desc:"מתמחה ביצירת תמונות איכותיות",             imageModel:"dall-e-3"   },
      { id:"dall-e-2", name:"DALL·E 2", badge:"מהיר",   badgeColor:"#f59e0b", desc:"מהיר ויעיל לעיבוד בכמויות",                imageModel:"dall-e-2"   },
    ];

    const TABS = ["✦ עורך","◈ ספריית רפרנס","◉ פרופילים שמורים"];
    const SEASON_COLORS = {
      "קיץ":"#f59e0b","חורף":"#60a5fa","אביב":"#34d399","סתיו":"#f97316",
      "כללי":"#888","אינסטגרם":"#ec4899","קטלוג":"#08f82e","מכירה":"#ef4444",
    };

    const DEFAULT_SETTINGS = {
      background:"אפור בהיר", lighting:"סטודיו נקי", angle:"פרונטלי ישיר",
      sharpness:"חד מאוד", shadow:"צל עדין", contrast:"רגיל",
      style:"מינימליסטי", aspect:"1:1 (ריבועי)", extraPrompt:"",
      productScale: 88,
      shadowOffset: 0,
    };

    const INITIAL_PROFILES = [
      { id:1, name:"קטלוג בסיסי",    campaign:"קטלוג",     ...DEFAULT_SETTINGS },
      { id:2, name:"אינסטגרם לוקס", campaign:"אינסטגרם", background:"גרדיאנט כהה", lighting:"רך ומפוזר", angle:"45° ימין", sharpness:"עומק שדה רדוד", shadow:"צל נפח", contrast:"ניגודיות גבוהה", style:"לוקס", aspect:"4:5 (אינסטגרם)", extraPrompt:"" },
      { id:3, name:"קמפיין קיץ",     campaign:"קיץ",       background:"לבן נקי", lighting:"טבעי - חלון", angle:"45° ימין", sharpness:"פוקוס מושלם", shadow:"צל עדין", contrast:"רגיל", style:"אורגני-טבעי", aspect:"4:5 (אינסטגרם)", extraPrompt:"warm summer tones, bright and airy feel" },
    ];

    function buildPrompt(s) {
      return ["Professional product photography, commercial studio shot",
        `Background: ${s.background}`,`Studio lighting: ${s.lighting}`,
        `Camera angle: ${s.angle}`,`Sharpness and depth of field: ${s.sharpness}`,
        `Shadow style: ${s.shadow}`,`Contrast: ${s.contrast}`,
        `Visual style: ${s.style}`,`Aspect ratio: ${s.aspect}`,
        s.extraPrompt||null,
        "photorealistic, ultra high quality, clean professional look, isolated product on background, commercial photography"
      ].filter(Boolean).join(". ");
    }

    // ── Tag ───────────────────────────────────────────────────────
    function Tag({ label, value, onChange, options }) {
      return (
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:10, fontWeight:700, color:C.greenDark, letterSpacing:2, textTransform:"uppercase", marginBottom:7 }}>{label}</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
            {options.map(opt => (
              <button key={opt} onClick={() => onChange(opt)} style={{
                padding:"5px 11px", borderRadius:4,
                border: value===opt ? `1.5px solid ${C.green}` : `1px solid ${C.inputBorder}`,
                background: value===opt ? C.greenLight : "#ffffff",
                color: value===opt ? C.greenDark : C.mutedDark,
                fontSize:11, fontFamily:"Rubik", cursor:"pointer",
                transition:"all 0.15s", fontWeight: value===opt ? 600 : 400,
              }}>{opt}</button>
            ))}
          </div>
        </div>
      );
    }

    // ── UploadZone ────────────────────────────────────────────────
    function UploadZone({ onFiles, images, onRemove }) {
      const [drag, setDrag] = useState(false);
      const inputRef = useRef();
      const handleDrop = useCallback((e) => {
        e.preventDefault(); setDrag(false);
        const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith("image/"));
        if (files.length) onFiles(files);
      }, [onFiles]);
      return (
        <div>
          <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
            onDrop={handleDrop} onClick={()=>inputRef.current?.click()}
            style={{ border:drag?`2px solid ${C.green}`:`2px dashed ${C.inputBorder}`, borderRadius:10,
              padding:"28px 16px", textAlign:"center", cursor:"pointer",
              background:drag?C.greenLight:C.panelBg, transition:"all 0.2s", marginBottom:14 }}>
            <div style={{ fontSize:26, marginBottom:8, color:C.muted }}>⊕</div>
            <div style={{ color:C.bodyText, fontSize:12, fontFamily:"Rubik", fontWeight:500 }}>גרור תמונות מוצר לכאן</div>
            <div style={{ color:C.muted, fontSize:10, marginTop:4 }}>PNG · JPG · WEBP</div>
            <input ref={inputRef} type="file" multiple accept="image/*" style={{ display:"none" }}
              onChange={e => onFiles(Array.from(e.target.files).filter(f=>f.type.startsWith("image/")))} />
          </div>
          {images.length>0 && (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:7 }}>
              {images.map((img,i) => (
                <div key={i} style={{ position:"relative", borderRadius:6, overflow:"hidden", aspectRatio:"1", background:C.panelBg, border:`1px solid ${C.panelBorder}` }}>
                  <img src={img.preview} alt="" style={{ width:"100%", height:"100%", objectFit:"contain" }} />
                  <div onClick={()=>onRemove(i)} style={{ position:"absolute", inset:0, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", background:"transparent", transition:"background 0.15s" }}
                    onMouseEnter={e=>e.currentTarget.style.background="rgba(239,68,68,0.35)"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <span style={{ color:"#fff", fontSize:16 }}>✕</span>
                  </div>
                  {img.status && (
                    <div style={{ position:"absolute", top:4, right:4,
                      background:img.status==="done"?C.green:img.status==="processing"?"#f8a208":"#ef4444",
                      borderRadius:3, padding:"2px 5px", fontSize:8, fontWeight:700, color:"#000"
                    }}>{img.status==="done"?"✓":img.status==="processing"?"↻":"!"}</div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── AuthScreen ────────────────────────────────────────────────
    function AuthScreen({ onLogin, fb }) {
      const [mode, setMode]         = useState("login");
      const [email, setEmail]       = useState("");
      const [password, setPassword] = useState("");
      const [name, setName]         = useState("");
      const [error, setError]       = useState("");
      const [loading, setLoading]   = useState(false);

      const inp = { width:"100%", padding:"10px 12px", background:C.inputBg,
        border:`1px solid ${C.inputBorder}`, borderRadius:7, color:C.bodyText,
        fontSize:13, fontFamily:"Rubik", marginBottom:12, direction:"ltr" };

      const handleSubmit = async () => {
        setError(""); setLoading(true);
        try {
          if (mode==="login") {
            const cred = await fb.signInWithEmailAndPassword(fb.auth, email, password);
            onLogin(cred.user);
          } else {
            if (!name.trim()) { setError("נא להזין שם מלא"); setLoading(false); return; }
            const cred = await fb.createUserWithEmailAndPassword(fb.auth, email, password);
            await fb.updateProfile(cred.user, { displayName: name });
            await fb.setDoc(fb.doc(fb.db,"users",cred.user.uid), {
              name, email, role:"user", createdAt: new Date().toISOString()
            });
            onLogin(cred.user);
          }
        } catch(e) {
          const msgs = {
            "auth/user-not-found":"משתמש לא נמצא",
            "auth/wrong-password":"סיסמה שגויה",
            "auth/email-already-in-use":"האימייל כבר רשום",
            "auth/weak-password":"הסיסמה חלשה מדי (לפחות 6 תווים)",
            "auth/invalid-email":"אימייל לא תקין",
            "auth/invalid-credential":"פרטי התחברות שגויים",
          };
          setError(msgs[e.code] || e.message);
        }
        setLoading(false);
      };

      return (
        <div style={{ minHeight:"100vh", background:C.headerBg, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Rubik", direction:"rtl" }}>
          <div style={{ background:"#ffffff", borderRadius:16, padding:40, width:400, boxShadow:"0 20px 60px rgba(0,0,0,0.4)" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:32, justifyContent:"center" }}>
              <div style={{ width:40, height:40, borderRadius:"50%", background:"#000", border:"2px solid #000", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, color:"#fff", fontWeight:900 }}>S</div>
              <div>
                <div style={{ fontSize:20, fontWeight:800, letterSpacing:2, color:C.bodyText }}>samora<span style={{ color:C.green }}>.LAB</span></div>
                <div style={{ fontSize:8, color:C.muted, letterSpacing:3 }}>PRODUCT IMAGE STUDIO</div>
              </div>
            </div>
            <div style={{ display:"flex", background:C.panelBg, borderRadius:8, padding:4, marginBottom:24 }}>
              {[["login","התחברות"],["register","הרשמה"]].map(([m,lbl]) => (
                <button key={m} onClick={()=>{setMode(m);setError("");}} style={{
                  flex:1, padding:"8px 0", borderRadius:6, border:"none", cursor:"pointer", fontFamily:"Rubik", fontSize:12, fontWeight:600,
                  background:mode===m?"#ffffff":"transparent", color:mode===m?C.bodyText:C.muted,
                  boxShadow:mode===m?"0 1px 4px rgba(0,0,0,0.1)":"none", transition:"all 0.15s",
                }}>{lbl}</button>
              ))}
            </div>
            {mode==="register" && <input value={name} onChange={e=>setName(e.target.value)} placeholder="שם מלא" style={{...inp, direction:"rtl"}} />}
            <input type="email"    value={email}    onChange={e=>setEmail(e.target.value)}    placeholder="אימייל" style={inp} />
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="סיסמה"  style={{...inp, marginBottom:8}} />
            {error && <div style={{ fontSize:11, color:"#ef4444", marginBottom:12, padding:"8px 10px", background:"rgba(239,68,68,0.08)", borderRadius:6, border:"1px solid rgba(239,68,68,0.2)" }}>{error}</div>}
            <button onClick={handleSubmit} disabled={loading} style={{
              width:"100%", padding:12, borderRadius:8, border:"none",
              background:loading?C.panelBorder:C.green, color:"#000",
              fontSize:13, fontWeight:700, cursor:loading?"default":"pointer", fontFamily:"Rubik",
              boxShadow:loading?"none":"0 4px 14px rgba(8,220,46,0.35)", transition:"all 0.2s",
            }}>
              {loading?"...":mode==="login"?"התחבר/י":"הירשם/י"}
            </button>
          </div>
        </div>
      );
    }

    // ── UserManagement ─────────────────────────────────────────────
    function UserManagement({ currentUser, onClose, fb }) {
      const [users, setUsers]       = useState([]);
      const [loading, setLoading]   = useState(true);
      const [newEmail, setNewEmail] = useState("");
      const [newName, setNewName]   = useState("");
      const [newRole, setNewRole]   = useState("user");
      const [adding, setAdding]     = useState(false);
      const [error, setError]       = useState("");
      const [success, setSuccess]   = useState("");

      const loadUsers = async () => {
        setLoading(true);
        const snap = await fb.getDocs(fb.collection(fb.db,"users"));
        setUsers(snap.docs.map(d => ({ id:d.id, ...d.data() })));
        setLoading(false);
      };

      useEffect(() => { loadUsers(); }, []);

      const addUser = async () => {
        setError(""); setSuccess(""); setAdding(true);
        try {
          if (!newEmail||!newName) { setError("נא למלא שם ואימייל"); setAdding(false); return; }
          const tempId = `invite_${Date.now()}`;
          await fb.setDoc(fb.doc(fb.db,"users",tempId), {
            name:newName, email:newEmail, role:newRole,
            status:"invited", createdAt:new Date().toISOString(), createdBy:currentUser.email
          });
          setSuccess(`הזמנה נשמרה עבור ${newEmail}. המשתמש יוכל להירשם עם האימייל הזה.`);
          setNewEmail(""); setNewName(""); setNewRole("user");
          loadUsers();
        } catch(e) { setError(e.message); }
        setAdding(false);
      };

      const removeUser = async (uid, userName) => {
        if (uid===currentUser.uid) { setError("לא ניתן למחוק את עצמך"); return; }
        if (!confirm(`למחוק את ${userName}?`)) return;
        await fb.deleteDoc(fb.doc(fb.db,"users",uid));
        loadUsers();
      };

      const updateRole = async (uid, role) => {
        await fb.setDoc(fb.doc(fb.db,"users",uid), { role }, { merge:true });
        loadUsers();
      };

      const inp = { padding:"8px 10px", background:C.inputBg, border:`1px solid ${C.inputBorder}`, borderRadius:6, color:C.bodyText, fontSize:11, fontFamily:"Rubik" };

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ background:"#fff", borderRadius:14, width:640, maxHeight:"80vh", display:"flex", flexDirection:"column", boxShadow:"0 20px 60px rgba(0,0,0,0.2)", direction:"rtl" }}>
            <div style={{ padding:"18px 24px", borderBottom:`1px solid ${C.panelBorder}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontSize:15, fontWeight:700, color:C.bodyText }}>ניהול משתמשים</div>
                <div style={{ fontSize:10, color:C.muted, marginTop:2 }}>הוסף, ערוך ומחק משתמשים מהמערכת</div>
              </div>
              <button onClick={onClose} style={{ fontSize:18, color:C.muted, background:"none", border:"none", cursor:"pointer" }}>✕</button>
            </div>
            <div style={{ overflowY:"auto", padding:24, flex:1 }}>
              <div style={{ background:C.panelBg, borderRadius:10, padding:18, marginBottom:24, border:`1px solid ${C.panelBorder}` }}>
                <div style={{ fontSize:11, fontWeight:700, color:C.bodyText, marginBottom:14 }}>הוסף משתמש חדש</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
                  <input value={newName}  onChange={e=>setNewName(e.target.value)}  placeholder="שם מלא" style={{...inp, direction:"rtl"}} />
                  <input value={newEmail} onChange={e=>setNewEmail(e.target.value)} placeholder="אימייל" style={{...inp, direction:"ltr"}} />
                </div>
                <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                  <select value={newRole} onChange={e=>setNewRole(e.target.value)} style={{...inp, flex:1}}>
                    <option value="user">משתמש רגיל</option>
                    <option value="admin">מנהל</option>
                  </select>
                  <button onClick={addUser} disabled={adding} style={{ padding:"8px 20px", borderRadius:6, border:"none", background:C.green, color:"#000", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"Rubik", opacity:adding?0.6:1 }}>
                    {adding?"...":"+ הוסף"}
                  </button>
                </div>
                {error   && <div style={{ fontSize:11, color:"#ef4444", marginTop:10, padding:"7px 10px", background:"rgba(239,68,68,0.08)", borderRadius:6 }}>{error}</div>}
                {success && <div style={{ fontSize:11, color:C.greenDark, marginTop:10, padding:"7px 10px", background:C.greenLight, borderRadius:6 }}>{success}</div>}
              </div>
              <div style={{ fontSize:11, fontWeight:700, color:C.mutedDark, marginBottom:12 }}>משתמשים רשומים ({users.length})</div>
              {loading ? (
                <div style={{ textAlign:"center", padding:"30px 0", color:C.muted }}>טוען...</div>
              ) : users.map(u => (
                <div key={u.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 14px", background:"#fff", borderRadius:8, border:`1px solid ${C.panelBorder}`, marginBottom:8 }}>
                  <div style={{ width:36, height:36, borderRadius:"50%", background:u.role==="admin"?C.headerBg:C.panelBg, border:`2px solid ${u.role==="admin"?C.green:C.panelBorder}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, color:u.role==="admin"?"#fff":C.mutedDark, fontWeight:700, flexShrink:0 }}>
                    {(u.name||u.email||"?")[0].toUpperCase()}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:12, fontWeight:600, color:C.bodyText }}>{u.name||"—"}</div>
                    <div style={{ fontSize:10, color:C.muted }}>{u.email}</div>
                    {u.status==="invited" && <div style={{ fontSize:9, color:"#f59e0b", marginTop:2 }}>⏳ ממתין להרשמה</div>}
                  </div>
                  <select value={u.role||"user"} onChange={e=>updateRole(u.id,e.target.value)}
                    style={{ padding:"4px 8px", background:C.inputBg, border:`1px solid ${C.inputBorder}`, borderRadius:5, color:C.mutedDark, fontSize:10, fontFamily:"Rubik" }}>
                    <option value="user">משתמש</option>
                    <option value="admin">מנהל</option>
                  </select>
                  {u.id!==currentUser.uid ? (
                    <button onClick={()=>removeUser(u.id,u.name||u.email)} style={{ padding:"5px 10px", borderRadius:5, border:"1px solid rgba(239,68,68,0.3)", background:"rgba(239,68,68,0.05)", color:"#ef4444", fontSize:10, cursor:"pointer", fontFamily:"Rubik" }}>מחק</button>
                  ) : (
                    <div style={{ fontSize:9, color:C.muted, padding:"5px 10px" }}>את/ה</div>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    //  MAIN APP
    // ════════════════════════════════════════════════════════════════
    function App() {

      const [apiKeys, setApiKeys] = useState(() => {

      });
      const [showApiModal, setShowApiModal]   = useState(false);
      const [processing, setProcessing]       = useState(false);
      const [profiles, setProfiles]           = useState(INITIAL_PROFILES);
      const [profileName, setProfileName]     = useState("");
      const [profileCampaign, setProfileCampaign] = useState("כללי");
      const [settings, setSettings]           = useState({ ...DEFAULT_SETTINGS });
      const [campaigns, setCampaigns]         = useState([

      // Free prompt mode state

      // Reference image state

      const set = (key) => (val) => setSettings(p => ({ ...p,[key]:val }));

      const addCampaign = () => {

      };
      const saveProfile = () => {

      };
      const loadProfile = (p) => {
        setSettings({ background:p.background, lighting:p.lighting, angle:p.angle, sharpness:p.sharpness, shadow:p.shadow, contrast:p.contrast||"רגיל", style:p.style, aspect:p.aspect, extraPrompt:p.extraPrompt||"" });
        setActiveTab(0);
      };
      const REMOVEBG_API_KEY = "NSAfyd5Z6hmSGk7Ud2RPUq8u";

      // Aspect ratio → output size mapping for gpt-image-1
      const ASPECT_TO_SIZE = {
        "1:1 (ריבועי)":       "1024x1024",
        "4:3 (סטנדרט)":       "1536x1024",
        "16:9 (רחב)":         "1536x1024",
        "2:3 (פורטרט)":       "1024x1536",
        "3:4 (פורטרט רחב)":   "1024x1536",
        "4:5 (אינסטגרם)":     "1024x1536",
      };

      // Convert image to square 1024x1024 PNG with transparent padding
      // (OpenAI edit API requires square input — we pad with transparency)
      const fileToSquarePng = (file) => new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          // Use 1024 as base size for best quality
          const SIZE = 1024;
          const canvas = document.createElement("canvas");
          canvas.width = SIZE; canvas.height = SIZE;
          const ctx = canvas.getContext("2d");
          ctx.clearRect(0, 0, SIZE, SIZE);

          // Scale image to fit inside 1024x1024 keeping aspect ratio
          const scale = Math.min(SIZE / img.width, SIZE / img.height);
          const sw = img.width  * scale;
          const sh = img.height * scale;
          const x  = (SIZE - sw) / 2;
          const y  = (SIZE - sh) / 2;

          ctx.drawImage(img, x, y, sw, sh);
          canvas.toBlob(
            blob => blob ? resolve(blob) : reject(new Error("Canvas toBlob failed")),
            "image/png"
          );
        };
        img.onerror = () => reject(new Error("Image load failed"));
        img.src = URL.createObjectURL(file);
      });

      // ── Step 1: Remove background via remove.bg ──────────────────
      const removeBackground = async (file) => {
        const fd = new FormData();
        fd.append("image_file", file);
        fd.append("size", "auto");
        const resp = await fetch("https://api.remove.bg/v1.0/removebg", {
          method: "POST",
          headers: { "X-Api-Key": REMOVEBG_API_KEY },
          body: fd,
        });
        if (!resp.ok) {
          const err = await resp.json().catch(()=>({}));
          throw new Error("remove.bg: " + (err?.errors?.[0]?.title || resp.status));
        }
        return await resp.blob();
      };

      // ── Step 2: Generate background — pure Canvas gradient, no AI ──
      // Samples colors from reference image (or uses settings) to build clean gradient
      const sampleImageColors = (imgSrc) => new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const c = document.createElement("canvas");
          c.width = 60; c.height = 60;
          const ctx = c.getContext("2d");
          ctx.drawImage(img, 0, 0, 60, 60);
          // Sample corners + top edge (background area)
          const topSamples    = [[2,2],[30,2],[58,2],[2,5],[58,5]];
          const bottomSamples = [[2,58],[30,58],[58,58]];
          const avg = (pts) => {
            let r=0,g=0,b=0;
            pts.forEach(([x,y]) => { const d=ctx.getImageData(x,y,1,1).data; r+=d[0];g+=d[1];b+=d[2]; });
            return { r:Math.round(r/pts.length), g:Math.round(g/pts.length), b:Math.round(b/pts.length) };
          };
          resolve({ top: avg(topSamples), bottom: avg(bottomSamples) });
        };
        img.onerror = () => resolve(null);
        img.src = imgSrc;
      });

      // Map settings → background colors
      const BG_COLORS = {
        "לבן נקי":        { top:{r:255,g:255,b:255}, bottom:{r:240,g:240,b:240} },
        "אפור בהיר":      { top:{r:220,g:220,b:220}, bottom:{r:200,g:200,b:200} },
        "אפור כהה":       { top:{r:100,g:100,b:100}, bottom:{r:70,g:70,b:70}   },
        "שחור":           { top:{r:30,g:30,b:30},    bottom:{r:10,g:10,b:10}   },
        "גרדיאנט אפור":   { top:{r:200,g:200,b:200}, bottom:{r:140,g:140,b:140} },
        "גרדיאנט כהה":    { top:{r:60,g:60,b:60},    bottom:{r:20,g:20,b:20}   },
        "בז' עדין":       { top:{r:245,g:240,b:230}, bottom:{r:225,g:218,b:205} },
        "כחול עמוק":      { top:{r:20,g:30,b:70},    bottom:{r:5,g:10,b:40}    },
      };

      const generateBackground = async (prompt, size, refImage, bgSetting, useDallE=false) => {
        const [outW, outH] = size.split("x").map(Number);
        const safeSize = (size === "1536x1024" || size === "1024x1536") ? size : "1024x1024";

        if (useDallE) {
          // ── Free prompt mode: generate real background with DALL-E 3 ──
          const bgPrompt = [
            "Empty product photography background — NO product, NO objects, NO people, NO text.",
            prompt,
            "Photorealistic, ultra high quality.",
          ].filter(Boolean).join(" ");

          const resp = await fetch("https://api.openai.com/v1/images/generations", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKeys.openai}` },
            body: JSON.stringify({ model: "dall-e-3", prompt: bgPrompt, n: 1, size: safeSize, quality: "hd", response_format: "b64_json" }),
          });
          const data = await resp.json();
          if (!data.data?.[0]?.b64_json) throw new Error(data.error?.message || "No background generated");
          return `data:image/png;base64,${data.data[0].b64_json}`;
        }

        // ── Settings mode: pure Canvas gradient ──
        let colors = null;
        if (refImage?.preview) {
          colors = await sampleImageColors(refImage.preview);
        }
        if (!colors) {
          colors = BG_COLORS[bgSetting] || BG_COLORS["אפור בהיר"];
        }

        const { top, bottom } = colors;

        const canvas = document.createElement("canvas");
        canvas.width = outW; canvas.height = outH;
        const ctx = canvas.getContext("2d");

        const grad = ctx.createLinearGradient(0, 0, 0, outH);
        grad.addColorStop(0,    `rgb(${Math.min(top.r+15,255)},${Math.min(top.g+15,255)},${Math.min(top.b+15,255)})`);
        grad.addColorStop(0.45, `rgb(${top.r},${top.g},${top.b})`);
        grad.addColorStop(1,    `rgb(${bottom.r},${bottom.g},${bottom.b})`);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, outW, outH);

        const brightness = (top.r + top.g + top.b) / 3;
        if (brightness > 60) {
          const radGrad = ctx.createRadialGradient(outW/2, outH*0.35, 0, outW/2, outH*0.35, outW*0.6);
          radGrad.addColorStop(0,   "rgba(255,255,255,0.12)");
          radGrad.addColorStop(1,   "rgba(255,255,255,0)");
          ctx.fillStyle = radGrad;
          ctx.fillRect(0, 0, outW, outH);
        }

        return canvas.toDataURL("image/png");
      };

      // ── Step 3: Composite product on background — pure Canvas, no AI touch ──
      const compositeImages = (bgDataUrl, productBlob, shadowStyle, outputSize, productScale, shadowOffset) => new Promise((resolve, reject) => {
        const [outW, outH] = outputSize.split("x").map(Number);
        const canvas = document.createElement("canvas");
        canvas.width = outW; canvas.height = outH;
        const ctx = canvas.getContext("2d");

        const bgImg = new Image();
        bgImg.onload = () => {
          // Draw background
          ctx.drawImage(bgImg, 0, 0, outW, outH);

          const productImg = new Image();
          productImg.onload = () => {
            const maxW = outW * (productScale/100), maxH = outH * (productScale/100);
            const scale = Math.min(maxW / productImg.width, maxH / productImg.height);
            const pw = productImg.width * scale, ph = productImg.height * scale;
            const px = (outW - pw) / 2;
            // Product sits on ground — position adjustable via shadowOffset (-50 to +50)
            const groundY = outH * (0.90 + shadowOffset * 0.002);
            const py = groundY - ph;

            const bottomY = groundY; // shadow starts exactly here

            // ── Draw product — ORIGINAL PIXELS, untouched ──
            ctx.drawImage(productImg, px, py, pw, ph);

            // ── SHADOW — only downward, like professional product photo ──
            if (shadowStyle !== "ללא צל") {
              const shadowAlpha = shadowStyle === "צל דרמטי" ? 0.45
                                : shadowStyle === "צל נפח"   ? 0.30
                                : shadowStyle === "צל עדין"  ? 0.18
                                : shadowStyle === "רפלקציה (ראי)" ? 0.15
                                : 0.22;
              const blurR = shadowStyle === "צל דרמטי" ? pw * 0.08
                          : shadowStyle === "צל נפח"   ? pw * 0.06
                          : pw * 0.04;
              // Shadow offset — only downward, never sideways
              const baseOffY = ph * 0.03;
              const extraOffY = Math.max(0, shadowOffset) * 0.4;
              const offY = baseOffY + extraOffY;

              // Draw product silhouette on offscreen canvas — then clip to bottom half only
              const sc = document.createElement("canvas");
              sc.width = outW; sc.height = outH;
              const sCtx = sc.getContext("2d");
              // Draw product, then tint black
              sCtx.drawImage(productImg, px, py + offY, pw, ph);
              sCtx.globalCompositeOperation = "source-atop";
              sCtx.fillStyle = `rgba(0,0,0,1)`;
              sCtx.fillRect(0, 0, outW, outH);
              sCtx.globalCompositeOperation = "source-over";

              // Clip shadow to bottom 40% of product only — no side/top shadow
              const clipY = py + ph * 0.60;
              const clipH = outH - clipY;

              ctx.save();
              ctx.beginPath();
              ctx.rect(0, clipY, outW, clipH);
              ctx.clip();
              ctx.globalAlpha = shadowAlpha;
              ctx.filter = `blur(${Math.round(blurR)}px)`;
              ctx.drawImage(sc, 0, 0);
              ctx.filter = "none";
              ctx.globalAlpha = 1;
              ctx.restore();

              // Redraw product clean on top
              ctx.drawImage(productImg, px, py, pw, ph);

              // ── Reflection (ראי only) ──
              if (shadowStyle === "רפלקציה (ראי)") {
                const reflH = ph * 0.30;
                const reflY = groundY;
                if (reflY + reflH < outH) {
                  const rc = document.createElement("canvas");
                  rc.width = outW; rc.height = outH;
                  const rCtx = rc.getContext("2d");
                  rCtx.save();
                  rCtx.translate(0, reflY * 2 + ph);
                  rCtx.scale(1, -1);
                  rCtx.drawImage(productImg, px, py, pw, ph);
                  rCtx.restore();
                  const fg = rCtx.createLinearGradient(0, reflY, 0, reflY + reflH);
                  fg.addColorStop(0, "rgba(255,255,255,0)");
                  fg.addColorStop(1, "rgba(255,255,255,1)");
                  rCtx.fillStyle = fg;
                  rCtx.fillRect(0, reflY, outW, reflH);
                  ctx.globalAlpha = 0.38;
                  ctx.drawImage(rc, 0, 0);
                  ctx.globalAlpha = 1;
                }
              }
            }

            resolve(canvas.toDataURL("image/png"));
          };
          productImg.onerror = reject;
          productImg.src = URL.createObjectURL(productBlob);
        };
        bgImg.onerror = reject;
        bgImg.src = bgDataUrl;
      });

      const handleProcess = async () => {
        if (!images.length) return;
        if (!apiKeys[selectedAI]) { setShowApiModal(true); return; }
        setProcessing(true);
        const prompt = buildPrompt(settings);
        const newResults = [];

        for (let i=0; i<images.length; i++) {
          setImages(prev => prev.map((img,idx) => idx===i?{ ...img,status:"processing" }:img));

          if (selectedAI==="openai") {
            try {
              const outputSize = ASPECT_TO_SIZE[settings.aspect] || "1024x1024";

              // Build background generation prompt
              let bgPrompt = "";
              let useDallE = false;

              if (promptMode === "ai" && freePromptText.trim()) {
                // ── AI מלא — with or without reference image ──
                setImages(prev => prev.map((img,idx) => idx===i?{ ...img,statusText:"יוצר תמונה עם AI..." }:img));
                const safeSize = (outputSize==="1536x1024"||outputSize==="1024x1536") ? outputSize : "1024x1024";

                let resultUrl = null;

                if (referenceImage) {
                  // Has reference — use gpt-image-1 edit so it SEES the reference
                  const refSource = referenceImage.file
                    ? referenceImage.file
                    : await fetch(referenceImage.preview).then(r=>r.blob());
                  const refPng = await fileToSquarePng(
                    refSource instanceof File ? refSource : new File([refSource],"ref.png",{type:"image/png"})
                  );
                  // Also send the product image so AI has context
                  const productPng = await fileToSquarePng(images[i].file);

                  const fd = new FormData();
                  fd.append("model", "gpt-image-1");
                  fd.append("image[]", productPng, "product.png");
                  fd.append("image[]", refPng, "reference.png");
                  fd.append("prompt", freePromptText.trim());
                  fd.append("n", "1");
                  fd.append("size", safeSize);
                  const aiResp = await fetch("https://api.openai.com/v1/images/edits", {
                    method: "POST",
                    headers: { "Authorization":`Bearer ${apiKeys.openai}` },
                    body: fd,
                  });
                  const aiData = await aiResp.json();
                  if (aiData.data?.[0]?.b64_json) resultUrl = `data:image/png;base64,${aiData.data[0].b64_json}`;
                  else if (aiData.data?.[0]?.url) resultUrl = aiData.data[0].url;
                  else throw new Error(aiData.error?.message || "No image generated");
                } else {
                  // No reference — use dall-e-3 with text only
                  const aiResp = await fetch("https://api.openai.com/v1/images/generations", {
                    method: "POST",
                    headers: { "Content-Type":"application/json", "Authorization":`Bearer ${apiKeys.openai}` },
                    body: JSON.stringify({ model:"dall-e-3", prompt:freePromptText.trim(), n:1, size:safeSize, quality:"hd", response_format:"b64_json" }),
                  });
                  const aiData = await aiResp.json();
                  if (!aiData.data?.[0]?.b64_json) throw new Error(aiData.error?.message || "No image generated");
                  resultUrl = `data:image/png;base64,${aiData.data[0].b64_json}`;
                }

                newResults.push({ original:images[i].preview, result:resultUrl, name:images[i].name, model: referenceImage ? "gpt-image-1 (AI + רפרנס)" : "dall-e-3 (AI מלא)" });
                setImages(prev => prev.map((img,idx) => idx===i?{ ...img,status:"done",statusText:"" }:img));
                continue;
              } else if (promptMode === "free" && freePromptText.trim()) {
                bgPrompt = freePromptText.trim();
                useDallE = true;
              } else {
                const refNote = referenceImage
                  ? "Match the visual style, mood, color palette and background treatment of the reference style."
                  : "";
                bgPrompt = [
                  refNote,
                  `Background: ${settings.background}.`,
                  `Lighting: ${settings.lighting}.`,
                  `Shadow style: ${settings.shadow}.`,
                  `Visual style: ${settings.style}.`,
                  `Contrast: ${settings.contrast}.`,
                  settings.extraPrompt || "",
                ].filter(Boolean).join(" ");
                useDallE = false;
              }

              // ── Step 1: Remove background from product image ──
              setImages(prev => prev.map((img,idx) => idx===i?{ ...img,status:"processing", statusText:"מסיר רקע..." }:img));
              const cutoutBlob = await removeBackground(images[i].file);

              // ── Step 2: Generate new background ──
              setImages(prev => prev.map((img,idx) => idx===i?{ ...img,statusText:useDallE?"יוצר רקע עם AI...":"בונה רקע..." }:img));
              const bgUrl = await generateBackground(bgPrompt, outputSize, referenceImage, settings.background, useDallE);

              // ── Step 3: Composite + Canvas shadows (product pixels untouched) ──
              setImages(prev => prev.map((img,idx) => idx===i?{ ...img,statusText:"מרכיב תמונה וצללים..." }:img));
              const resultUrl = await compositeImages(bgUrl, cutoutBlob, settings.shadow, outputSize, settings.productScale||88, settings.shadowOffset||0);

              newResults.push({ original:images[i].preview, result:resultUrl, name:images[i].name, model:"inpainting" });
              setImages(prev => prev.map((img,idx) => idx===i?{ ...img,status:"done", statusText:"" }:img));

            } catch(err) {
              console.error("Processing error:", err);
              setImages(prev => prev.map((img,idx) => idx===i?{ ...img,status:"error", statusText:err.message }:img));
            }
          } else {
            // Other providers — placeholder
            await new Promise(r => setTimeout(r, 800));
            newResults.push({ original:images[i].preview, result:images[i].preview, name:images[i].name, simulated:true, model:selectedAI });
            setImages(prev => prev.map((img,idx) => idx===i?{ ...img,status:"done" }:img));
          }
        }
        setResults(prev => [...prev,...newResults]); setProcessing(false);
      };

      const currentCampaign = campaigns.find(c => c.id===activeCampaign);
      const prompt = buildPrompt(settings);
      const greenBtn = { padding:"7px 18px", borderRadius:6, border:"none", background:C.green, color:"#000", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"Rubik" };
      const outlineGreenBtn = { borderRadius:6, border:`1px solid ${C.green}`, background:"transparent", color:C.green, fontFamily:"Rubik", cursor:"pointer", fontWeight:600 };

      if (!authReady) return (
        <div style={{ minHeight:"100vh", background:C.headerBg, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Rubik" }}>
          <div style={{ textAlign:"center" }}>
            <div style={{ width:44, height:44, borderRadius:"50%", background:"#000", border:"2px solid #fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, color:"#fff", fontWeight:900, margin:"0 auto 16px" }}>S</div>
            <div style={{ color:"#555", fontSize:12 }}>טוען...</div>
          </div>
        </div>
      );

      if (!authUser) return <AuthScreen onLogin={setAuthUser} fb={fb} />;

      return (
        <>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap');
            * { box-sizing:border-box; margin:0; padding:0; }
            html,body { height:100%; background:#fff; }
            ::-webkit-scrollbar { width:3px; }
            ::-webkit-scrollbar-track { background:#f0f0f0; }
            ::-webkit-scrollbar-thumb { background:#ccc; border-radius:2px; }
            input,textarea,select { outline:none; }
            .btn-green:hover { box-shadow:0 4px 14px rgba(8,220,46,0.4); transition:box-shadow 0.2s; }
          `}</style>

          {showUserMgmt && <UserManagement currentUser={authUser} onClose={()=>setShowUserMgmt(false)} fb={fb} />}

                  </div>

                  <div style={{ marginTop:6 }}>
                    <div style={{ fontSize:10, fontWeight:700, color:C.greenDark, letterSpacing:2, marginBottom:7, textTransform:"uppercase" }}>הוראות נוספות</div>
                    <textarea value={settings.extraPrompt} onChange={e=>setSettings(p=>({ ...p,extraPrompt:e.target.value }))} placeholder="לדוגמה: ערפל עדין ברקע, גוון זהוב..." style={{ width:"100%", height:62, padding:"9px 12px", background:C.inputBg, border:`1px solid ${C.inputBorder}`, borderRadius:7, color:C.bodyText, fontSize:11, fontFamily:"Rubik", resize:"vertical", lineHeight:1.6 }} />
                  </div>
                  <div style={{ marginTop:14, padding:"12px 14px", background:C.panelBg, border:`1px solid ${C.panelBorder}`, borderRadius:8 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
                      <div style={{ fontSize:8, color:C.muted, letterSpacing:2, fontWeight:700 }}>PROMPT אוטומטי</div>
                      <button onClick={()=>navigator.clipboard.writeText(prompt)} style={{ fontSize:9, color:C.muted, background:"none", border:"none", cursor:"pointer", fontFamily:"Rubik" }}>⧉ העתק</button>
                    </div>
                    <div style={{ fontSize:9, color:C.mutedDark, lineHeight:1.9, direction:"ltr" }}>{prompt}</div>
                  </div>
                </div>
                <div style={{ width:296, padding:"18px 14px", overflowY:"auto", flexShrink:0, background:C.panelBg, borderLeft:`1px solid ${C.panelBorder}` }}>

                  {/* ── Process button ── */}
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                    <div style={{ fontSize:9, fontWeight:700, color:C.bodyText, letterSpacing:2, textTransform:"uppercase" }}>תוצאות</div>
                    <button onClick={handleProcess} disabled={processing||!images.length} className={images.length&&!processing?"btn-green":""} style={{ ...greenBtn, background:images.length&&!processing?C.green:C.panelBorder, color:images.length&&!processing?"#000":C.muted, cursor:images.length?"pointer":"default", padding:"7px 16px" }}>
                      {processing?"↻ מעבד...":`▶ עבד${images.length?` (${images.length})`:""}`}
                    </button>
                  </div>
                  {results.length===0 ? (
                    <div style={{ textAlign:"center", padding:"50px 0", color:C.muted }}>
                      <div style={{ fontSize:34, marginBottom:10, opacity:0.3 }}>◈</div>
                      <div style={{ fontSize:11 }}>תוצאות יופיעו כאן</div>
                    </div>
                  ) : results.map((r,i) => (
                    <div key={i} style={{ marginBottom:14, background:"#fff", borderRadius:8, overflow:"hidden", border:`1px solid ${C.panelBorder}` }}>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr" }}>
                        <div style={{ padding:7, borderLeft:`1px solid ${C.panelBorder}` }}>
                          <div style={{ fontSize:7, color:C.muted, textAlign:"center", marginBottom:4 }}>מקור</div>
                          <img src={r.original} alt="" style={{ width:"100%", aspectRatio:"1", objectFit:"contain" }} />
                        </div>
                        <div style={{ padding:7 }}>
                          <div style={{ fontSize:7, color:C.greenDark, textAlign:"center", marginBottom:4 }}>תוצאה</div>
                          <img src={r.result} alt="" style={{ width:"100%", aspectRatio:"1", objectFit:"contain" }} />
                        </div>
                      </div>
                      <div style={{ padding:"6px 10px", borderTop:`1px solid ${C.panelBorder}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <div style={{ fontSize:8, color:C.muted, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:140 }}>{r.name}</div>
                        <a href={r.result} download style={{ fontSize:9, color:C.greenDark, textDecoration:"none", padding:"2px 8px", border:`1px solid ${C.green}`, borderRadius:4, fontWeight:600 }}>⬇</a>
                      </div>
                    </div>
                  ))}
                  {results.length>1 && <button className="btn-green" style={{ width:"100%", padding:9, borderRadius:6, border:`1px solid ${C.green}`, background:C.greenLight, color:C.greenDark, fontSize:10, fontWeight:700, cursor:"pointer", fontFamily:"Rubik" }}>⬇ הורד הכל</button>}
                </div>
              </div>
            )}

            {/* TAB 1 */}
            {activeTab===1 && (
              <div style={{ display:"flex", height:"calc(100vh - 108px)", overflow:"hidden" }}>
                <div style={{ width:216, borderLeft:`1px solid ${C.panelBorder}`, padding:"18px 13px", overflowY:"auto", flexShrink:0, background:C.panelBg }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                    <div style={{ fontSize:9, fontWeight:700, color:C.bodyText, letterSpacing:2, textTransform:"uppercase" }}>תיקיות קמפיין</div>
                    <button onClick={()=>setShowNewCampaign(v=>!v)} className="btn-green" style={{ width:22, height:22, borderRadius:5, background:C.green, border:"none", color:"#000", fontSize:15, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700 }}>+</button>
                  </div>
                  {showNewCampaign && (
                    <div style={{ marginBottom:12, padding:11, background:"#fff", borderRadius:8, border:`1px solid ${C.panelBorder}` }}>
                      <input value={newCampaignName} onChange={e=>setNewCampaignName(e.target.value)} placeholder="שם התיקייה..." style={{ width:"100%", padding:"6px 8px", background:C.inputBg, border:`1px solid ${C.inputBorder}`, borderRadius:5, color:C.bodyText, fontSize:10, fontFamily:"Rubik", marginBottom:7 }} />
                      <select value={newCampaignSeason} onChange={e=>setNewCampaignSeason(e.target.value)} style={{ width:"100%", padding:"6px 8px", background:C.inputBg, border:`1px solid ${C.inputBorder}`, borderRadius:5, color:C.mutedDark, fontSize:10, fontFamily:"Rubik", marginBottom:8 }}>
                        {Object.keys(SEASON_COLORS).map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                      <button onClick={addCampaign} className="btn-green" style={{ ...greenBtn, width:"100%", padding:7, fontSize:10 }}>צור תיקייה</button>
                    </div>
                  )}
                  {campaigns.map(c => (
                    <div key={c.id} onClick={()=>setActiveCampaign(c.id)} style={{ padding:"9px 11px", borderRadius:7, cursor:"pointer", marginBottom:4, background:activeCampaign===c.id?C.greenLight:"#fff", border:activeCampaign===c.id?`1px solid ${C.green}`:`1px solid ${C.panelBorder}` }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <div style={{ width:8, height:8, borderRadius:"50%", background:SEASON_COLORS[c.season]||"#aaa", flexShrink:0 }} />
                        <div>
                          <div style={{ fontSize:11, color:activeCampaign===c.id?C.greenDark:C.bodyText, fontWeight:600 }}>{c.name}</div>
                          <div style={{ fontSize:8, color:C.muted, marginTop:1 }}>{c.refs.length} / 50 תמונות</div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ flex:1, padding:"20px 26px", overflowY:"auto" }}>
                  {currentCampaign && (<>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                        <div style={{ width:10, height:10, borderRadius:"50%", background:SEASON_COLORS[currentCampaign.season]||C.muted }} />
                        <div style={{ fontSize:16, fontWeight:700, color:C.bodyText }}>{currentCampaign.name}</div>
                      </div>
                      <button onClick={()=>refInputRef.current?.click()} className="btn-green" style={greenBtn}>+ הוסף תמונות</button>
                      <input ref={refInputRef} type="file" multiple accept="image/*" style={{ display:"none" }} onChange={e=>handleRefFiles(Array.from(e.target.files))} />
                    </div>
                    {currentCampaign.refs.length===0 ? (
                      <div style={{ textAlign:"center", padding:"80px 0", color:C.muted }}>
                        <div style={{ fontSize:44, marginBottom:12, opacity:0.2 }}>◈</div>
                        <div style={{ fontSize:14, marginBottom:6, fontWeight:600, color:C.mutedDark }}>התיקייה ריקה</div>
                      </div>
                    ) : (
                      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))", gap:14 }}>
                        {currentCampaign.refs.map(ref => (
                          <div key={ref.id} style={{ background:"#fff", borderRadius:10, overflow:"hidden", border:`1px solid ${C.panelBorder}` }}>
                            <div style={{ position:"relative" }}>
                              <img src={ref.preview} alt="" style={{ width:"100%", aspectRatio:"1", objectFit:"cover" }} />
                              <button onClick={()=>setCampaigns(prev=>prev.map(c=>c.id===activeCampaign?{ ...c,refs:c.refs.filter(r=>r.id!==ref.id) }:c))} style={{ position:"absolute", top:5, left:5, width:22, height:22, borderRadius:"50%", background:"rgba(0,0,0,0.6)", border:"none", color:"#fff", fontSize:10, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                            </div>
                            <div style={{ padding:"8px 10px" }}>
                              <input value={ref.note} onChange={e=>setCampaigns(prev=>prev.map(c=>c.id===activeCampaign?{ ...c,refs:c.refs.map(r=>r.id===ref.id?{ ...r,note:e.target.value }:r) }:c))} placeholder="תיוג / הערה..." style={{ width:"100%", padding:"5px 7px", background:C.inputBg, border:`1px solid ${C.inputBorder}`, borderRadius:5, color:C.bodyText, fontSize:9, fontFamily:"Rubik" }} />
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </>)}
                </div>
              </div>
            )}

            {/* TAB 2 */}
            {activeTab===2 && (
              <div style={{ padding:"26px 30px", overflowY:"auto", height:"calc(100vh - 108px)", background:C.panelBg }}>
                <div style={{ marginBottom:24 }}>
                  <div style={{ fontSize:16, fontWeight:700, color:C.bodyText, marginBottom:4 }}>פרופילים שמורים</div>
                  <div style={{ fontSize:11, color:C.muted }}>הגדרות מוכנות לפי קמפיין, עונה ופלטפורמה</div>
                </div>
                {Object.keys(SEASON_COLORS).map(season => {
                  const group = profiles.filter(p => p.campaign===season);
                  if (!group.length) return null;
                  return (
                    <div key={season} style={{ marginBottom:32 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
                        <div style={{ width:8, height:8, borderRadius:"50%", background:SEASON_COLORS[season] }} />
                        <div style={{ fontSize:11, fontWeight:700, color:C.mutedDark, letterSpacing:1 }}>{season}</div>
                        <div style={{ flex:1, height:1, background:C.panelBorder }} />
                      </div>
                      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(255px,1fr))", gap:13 }}>
                        {group.map(p => (
                          <div key={p.id} style={{ background:"#fff", border:`1px solid ${C.panelBorder}`, borderRadius:10, padding:18 }}>
                            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:14 }}>
                              <div style={{ fontSize:13, fontWeight:700, color:C.bodyText }}>{p.name}</div>
                              <button onClick={()=>setProfiles(prev=>prev.filter(pr=>pr.id!==p.id))} style={{ fontSize:12, color:C.muted, background:"none", border:"none", cursor:"pointer" }}>✕</button>
                            </div>
                            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
                              {[["רקע",p.background],["תאורה",p.lighting],["זווית",p.angle],["יחס",p.aspect],["סגנון",p.style],["צל",p.shadow]].map(([l,v]) => (
                                <div key={l}>
                                  <div style={{ fontSize:8, color:C.muted, letterSpacing:1, marginBottom:2, textTransform:"uppercase" }}>{l}</div>
                                  <div style={{ fontSize:10, color:C.mutedDark, fontWeight:500 }}>{v}</div>
                                </div>
                              ))}
                            </div>
                            <button onClick={()=>loadProfile(p)} className="btn-green" style={{ width:"100%", padding:9, borderRadius:6, border:`1px solid ${C.green}`, background:C.greenLight, color:C.greenDark, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"Rubik" }}>טען פרופיל ←</button>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
